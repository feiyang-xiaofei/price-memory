<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="bg16" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="16" height="16" rx="3" fill="url(#bg16)"/>
  <!-- Bottom diamond layer (largest, dimmest) -->
  <polygon points="8,3 13,8.5 8,14 3,8.5" fill="none" stroke="#00ff88" stroke-opacity="0.3" stroke-width="0.8"/>
  <!-- Middle diamond layer -->
  <polygon points="8,4.5 11.5,8.5 8,12.5 4.5,8.5" fill="none" stroke="#00ff88" stroke-opacity="0.6" stroke-width="0.9"/>
  <!-- Top diamond layer (smallest, brightest) -->
  <polygon points="8,6 10,8.5 8,11 6,8.5" fill="#00ff88" fill-opacity="0.15" stroke="#00ff88" stroke-opacity="1" stroke-width="1"/>
  <!-- Center glow dot -->
  <circle cx="8" cy="8.5" r="1" fill="#00ff88" fill-opacity="0.8"/>
</svg>
